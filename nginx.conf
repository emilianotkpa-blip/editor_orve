server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # hashed build assets → cache forever
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # SPA fallback: el editor (/) y la landing pública (/u/{slug})
  # se sirven con index.html (ruteo en el cliente)
  location / {
    try_files $uri $uri/ /index.html;
  }
}
